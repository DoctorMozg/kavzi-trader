# BTC Trend Following Strategy

name: "BTC Trend Following Strategy"
description: "A trend following strategy for Bitcoin using LSTM predictions"
version: "1.0.0"
author: "KavziTrader"
created_at: "2023-07-01T10:00:00Z"

# Target assets
symbols:
  - "BTCUSDT"

# Strategy reference
strategy:
  name: "lstm_trend_predictor"
  model_id: 5
  parameters:
    prediction_threshold: 0.65
    confirmation_periods: 2

# Risk management
risk:
  position_sizing:
    type: "fixed_usd"  # Options: fixed_usd, percentage, risk_based, kelly
    value: 1000  # $1000 per position
  max_positions: 1
  max_trades_per_day: 5
  max_drawdown: 0.15  # 15% max drawdown
  stop_loss:
    type: "percent"  # Options: percent, atr, volatility
    value: 0.03  # 3% stop loss
  take_profit:
    type: "percent"  # Options: percent, atr, risk_multiple, custom
    value: 0.09  # 9% take profit (3:1 risk-reward)
  trailing_stop:
    enabled: true
    activation_percent: 0.03  # Activate after 3% profit
    callback_rate: 0.01  # 1% callback

# Entry conditions
entry:
  logic: "ALL"  # ALL = AND, ANY = OR, CUSTOM for custom logic
  conditions:
    - id: "c1"
      type: "model_signal"
      value: "long"
      timeframe: "1h"
    - id: "c2"
      type: "technical"
      indicator: "RSI"
      comparison: "<"
      value: 70
      timeframe: "1h"
    - id: "c3"
      type: "price_action"
      pattern: "higher_lows"
      periods: 3
      timeframe: "4h"
  # Custom logic expression (optional, used when logic: "CUSTOM")
  # custom_logic: "(c1 AND c2) OR c3"
  confirmation:
    - type: "volume"
      comparison: ">"
      value: "average_20"
  time_constraints:
    min_between_trades: 240  # minutes

# Exit conditions
exit:
  logic: "ANY"  # ALL = AND, ANY = OR, CUSTOM for custom logic
  conditions:
    - id: "e1"
      type: "stop_loss_hit"
    - id: "e2"
      type: "take_profit_hit"
    - id: "e3"
      type: "model_signal"
      value: "exit"
      timeframe: "1h"
    - id: "e4"
      type: "time_based"
      max_holding_time: 72  # hours
  # Custom logic expression for more complex exit rules
  # custom_logic: "e1 OR e2 OR (e3 AND e4)"

# Execution settings
execution:
  order_type: "MARKET"  # Options: MARKET, LIMIT, STOP, STOP_LIMIT
  retry_attempts: 3
  retry_delay: 10  # seconds
  price_adjustment:
    enabled: false
    method: "percentage"
    value: 0.001  # 0.1%
  partial_exits:
    enabled: true
    levels:
      - percentage: 0.5  # Exit 50% of position
        trigger: 0.05    # at 5% profit

# Schedule
schedule:
  enabled: true
  timezone: "UTC"
  active_days:
    - "Monday"
    - "Tuesday"
    - "Wednesday"
    - "Thursday"
    - "Friday"
    - "Saturday"
    - "Sunday"
  exclude_dates:
    - "2023-12-25"
    - "2024-01-01"
  trading_hours:
    start: "00:00"
    end: "23:59"

# Additional filters
filters:
  market_volatility:
    enabled: true
    indicator: "ATR"
    timeframe: "1d"
    min_threshold: 0.01
    max_threshold: 0.05
  market_trend:
    enabled: true
    indicator: "EMA"
    parameters:
      fast: 20
      slow: 50
    condition: "fast_above_slow"
