# -------------------------------------------------------------------
# KAVZITRADER TIMESCALEDB POSTGRESQL CONFIGURATION FOR TRADING
# -------------------------------------------------------------------
#
# This configuration is optimized for high-frequency trading workloads
# with TimescaleDB. Settings are tuned for systems with 8GB+ RAM.
#
# -------------------------------------------------------------------
# CONNECTION SETTINGS
# -------------------------------------------------------------------

listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 10
unix_socket_directories = '/var/run/postgresql'

# -------------------------------------------------------------------
# RESOURCE MANAGEMENT
# -------------------------------------------------------------------

# Memory Configuration
shared_buffers = 6GB                 # 25% of total RAM for dedicate db instance
work_mem = 32MB                      # Per operation memory
maintenance_work_mem = 1GB           # For maintenance operations
effective_cache_size = 12GB          # Estimate of OS page cache (~50-75% RAM)
temp_file_limit = 10GB               # Limit temp file usage

# Background Writer
bgwriter_delay = 200ms               # Sleep between rounds
bgwriter_lru_maxpages = 1000         # Max pages per round
bgwriter_lru_multiplier = 10.0       # Multiple of recent need

# Parallel Query
max_worker_processes = 24            # Maximum worker processes
max_parallel_workers_per_gather = 4  # Workers per gather node
max_parallel_workers = 16            # Max workers for entire query
parallel_leader_participation = on   # Leader also performs work

# -------------------------------------------------------------------
# WAL (WRITE-AHEAD LOG)
# -------------------------------------------------------------------

wal_level = replica                  # Minimal for non-replica systems
max_wal_size = 8GB                   # Maximum WAL size before checkpoint
min_wal_size = 2GB                   # Minimum WAL size
wal_buffers = 32MB                   # WAL buffer size (16MB is default)
checkpoint_timeout = 30min           # Max time between checkpoints
checkpoint_completion_target = 0.9   # Checkpoint spread timing
synchronous_commit = off             # DANGER: Improves performance but risks data loss on crash

# -------------------------------------------------------------------
# TRANSACTION MANAGEMENT
# -------------------------------------------------------------------

max_locks_per_transaction = 256      # For complex queries or many concurrent transactions
default_transaction_isolation = 'read committed'
lock_timeout = 10000                 # 10 seconds
idle_in_transaction_session_timeout = 60000  # 1 minute
deadlock_timeout = 1s                # Fast deadlock detection

# -------------------------------------------------------------------
# QUERY PLANNER SETTINGS
# -------------------------------------------------------------------

random_page_cost = 1.1               # SSD optimized (lower than default 4.0)
effective_io_concurrency = 200       # For SSDs
default_statistics_target = 100      # Target stats for columns
jit = on                             # Just In Time compilation

# Cost factors
cpu_tuple_cost = 0.01                # Cost for processing each tuple
cpu_index_tuple_cost = 0.001         # Cost for processing index tuples
cpu_operator_cost = 0.0025           # Cost for processing operators

# Query Optimization Flags
enable_partitionwise_join = on       # Better for TimescaleDB chunks
enable_partitionwise_aggregate = on  # Better for TimescaleDB chunks

# -------------------------------------------------------------------
# AUTOVACUUM SETTINGS
# -------------------------------------------------------------------

autovacuum = on                      # Enable autovacuum
log_autovacuum_min_duration = 0      # Log all vacuum operations
autovacuum_max_workers = 6           # Max vacuum processes
autovacuum_naptime = 10s             # Time between runs
autovacuum_vacuum_scale_factor = 0.05  # Fraction of table before vacuum
autovacuum_analyze_scale_factor = 0.025  # Fraction of table before analyze
vacuum_cost_delay = 10ms             # Cost-based vacuum delay
vacuum_cost_limit = 2000             # Limit for cost-based vacuum

# -------------------------------------------------------------------
# TIMESCALEDB-SPECIFIC SETTINGS
# -------------------------------------------------------------------

# Background workers
timescaledb.max_background_workers = 16

# Time-series optimization
timescaledb.max_insert_batch_size = 10000   # Larger batches for bulk inserts
timescaledb.telemetry_level = 'off'         # Disable telemetry

# Compression and Chunk Management
timescaledb.compress_chunk_time_interval = '7 days'   # When to compress chunks by default
timescaledb.max_chunks_per_insert = 128              # Performance tuning for multi-chunk inserts

# Load extensions
shared_preload_libraries = 'timescaledb,pg_stat_statements'

# -------------------------------------------------------------------
# LOGGING
# -------------------------------------------------------------------

log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 100MB

# What to Log
log_min_error_statement = info
log_min_duration_statement = 5000    # Log slow queries (5s+)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0                   # Log temporary file usage
log_line_prefix = '%m [%p] %q%u@%d '

# -------------------------------------------------------------------
# COMMITS/TRANSACTION GROUPS
# -------------------------------------------------------------------

commit_delay = 1000                  # Delay for transaction group commit (microseconds)
commit_siblings = 5                  # Min concurrent transactions for group commit

# -------------------------------------------------------------------
# MONITORING
# -------------------------------------------------------------------

track_io_timing = on                 # Track I/O timing statistics
track_functions = all                # Track function call statistics 