# Default execution configuration
execution:
  # Order settings
  orders:
    default_type: "MARKET"  # Options: MARKET, LIMIT, STOP, STOP_LIMIT
    time_in_force: "GTC"  # Options: GTC, IOC, FOK
    retry_attempts: 3
    retry_delay: 10  # seconds

  # Price adjustment for limit orders
  price_adjustment:
    enabled: false
    method: "percentage"  # Options: percentage, ticks, none
    value: 0.001  # 0.1% adjustment

  # Partial exits
  partial_exits:
    enabled: true
    levels:
      - percentage: 0.5  # Exit 50% of position
        trigger: 0.05    # at 5% profit
      - percentage: 0.25  # Exit another 25%
        trigger: 0.08    # at 8% profit

  # Execution schedule
  schedule:
    enabled: true
    timezone: "UTC"
    active_days:
      - "Monday"
      - "Tuesday"
      - "Wednesday"
      - "Thursday"
      - "Friday"
      - "Saturday"
      - "Sunday"
    trading_hours:
      start: "00:00"
      end: "23:59"

  # Slippage and fees
  slippage:
    model: "fixed_percentage"  # Options: fixed_percentage, random, none
    value: 0.0005  # 0.05% slippage

  fees:
    maker: 0.001  # 0.1% maker fee
    taker: 0.001  # 0.1% taker fee
    estimate_type: "taker"  # Default to higher fee for calculations
