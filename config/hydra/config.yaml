# Hydra configuration
hydra:
  run:
    dir: ${system.results_dir}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${system.results_dir}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: true
  job_logging:
    root:
      level: INFO
  output_subdir: .hydra
  help:
    app_name: kavzitrader
    header: |
      KavziTrader - Neural Network-Based Crypto Trading Platform
    footer: |
      For more information, check out https://github.com/yourusername/kavzitrader
    template: |
      ${hydra.help.header}
      == Configuration groups ==
      Compose your configuration from those groups (group=option)

      $APP_CONFIG_GROUPS

      == Config ==
      Override anything in the config (foo.bar=value)

      $CONFIG

      ${hydra.help.footer}
