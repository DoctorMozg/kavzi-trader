# Default data preprocessing configuration
preprocessing:
  # Data cleaning options
  cleaning:
    remove_outliers: true
    outlier_std_threshold: 3.0
    fill_missing: true
    fill_method: "ffill"  # forward fill

  # Normalization options
  normalization:
    method: "standard"  # Options: minmax, standard, robust
    feature_range: [-1, 1]  # For minmax normalization

  # Sequence preparation
  sequence:
    window_size: 60  # Number of time steps in each sequence
    forecast_horizon: 1  # Number of steps ahead to predict
    stride: 1  # Step size between consecutive sequences

  # Feature calculation
  features:
    include_raw: true  # Include raw OHLCV data
    include_technical: true  # Include technical indicators
    include_derived: true  # Include derived features (returns, etc.)

  # Train/val/test split
  split:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    shuffle: false  # Should be false for time series data
    gap_days: 1  # Gap between sets to avoid leakage
