# Default feature configuration
features:
  # Technical indicators to calculate
  technical_indicators:
    - name: "RSI"
      params:
        timeperiod: 14
    - name: "MACD"
      params:
        fastperiod: 12
        slowperiod: 26
        signalperiod: 9
    - name: "Bollinger Bands"
      params:
        timeperiod: 20
        nbdevup: 2
        nbdevdn: 2
    - name: "ATR"
      params:
        timeperiod: 14
    - name: "OBV"
      params: {}
    - name: "EMA"
      params:
        timeperiod: 20
    - name: "SMA"
      params:
        timeperiod: 50
    - name: "Stochastic"
      params:
        fastk_period: 14
        slowk_period: 3
        slowd_period: 3

  # Custom features
  custom_features:
    - name: "price_range_ratio"
      formula: "(high - low) / close"
    - name: "volume_delta_5"
      formula: "volume.pct_change(5)"
    - name: "price_change_ratio"
      formula: "close.pct_change()"
    - name: "log_return"
      formula: "np.log(close / close.shift(1))"

  # Feature transformation
  transformations:
    normalization: "standard_scaler"  # Options: minmax_scaler, standard_scaler, robust_scaler
    scaling: true
    log_transform: false

  # Feature selection
  selection:
    enabled: false
    method: "variance_threshold"
    threshold: 0.01
