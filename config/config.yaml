# Main configuration file for KavziTrader

# System settings
system:
  data_dir: "data/"
  models_dir: "models/"
  results_dir: "results/"
  timezone: "UTC"

# API credentials - these will be overridden by environment variables
api:
  binance:
    api_key: ${oc.env:BINANCE_API_KEY,""}
    api_secret: ${oc.env:BINANCE_API_SECRET,""}
    testnet: true
    use_proxy: false

# Trading configuration
trading:
  # Trading pairs to monitor and trade
  symbols:
    - BTCUSDT
    - ETHUSDT

  # Timeframe for analysis
  interval: "15m"

  # Maximum concurrent positions
  max_positions: 2

# Risk management
risk:
  max_risk_percent: 1.0              # Max % of account per trade
  min_rr_ratio: 1.5                  # Minimum risk/reward ratio
  max_drawdown_percent: 5.0          # Max drawdown - close all positions
  pause_new_entries_drawdown: 3.0    # Pause new trades at this drawdown
  max_position_size_percent: 10      # Max % of account per position

  # Volatility-based position size adjustments
  volatility_adjustments:
    LOW: 1.0
    NORMAL: 1.0
    HIGH: 0.5
    EXTREME: 0.25

# Position management
position_management:
  trailing_stop_atr_multiplier: 1.5  # Trail at this ATR distance
  break_even_trigger_atr: 1.0        # Move SL to BE after this ATR profit
  partial_exit_at_percent: 0.5       # Take partial at % to TP
  partial_exit_size: 0.3             # Exit this % of position
  max_hold_time_hours: 24            # Max time before reassessment
  scale_in_allowed: false            # Allow adding to positions

# Order flow settings
order_flow:
  fetch_interval_s: 60               # How often to fetch funding/OI
  funding_extreme_threshold: 2.0     # Z-score threshold for extreme funding
