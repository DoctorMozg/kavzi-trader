# =============================================================================
# KavziTrader — Main Configuration
# =============================================================================
# Brain-Spine crypto trading platform for Binance.
# Environment variables override values here (e.g. KT_OPENROUTER_API_KEY).

# -----------------------------------------------------------------------------
# System — directory paths and global defaults
# -----------------------------------------------------------------------------
system:
  data_dir: "data/"            # Market data storage (candles, order book snapshots)
  models_dir: "models/"        # Serialised ML / calibration artefacts
  results_dir: "results/"      # Back-test and analysis output
  timezone: "UTC"              # All internal timestamps use this timezone

# -----------------------------------------------------------------------------
# API — Binance credentials (override via BINANCE_API_KEY / BINANCE_API_SECRET)
# -----------------------------------------------------------------------------
api:
  binance:
    api_key: ""
    api_secret: ""
    testnet: true              # true = route orders to Binance Testnet, not live
    use_proxy: false           # true = route traffic through a configured HTTP proxy

# -----------------------------------------------------------------------------
# Brain — LLM tier configuration via OpenRouter
# See docs/RESEARCH_TRADE_MODELS.md for model selection rationale.
#
# Pipeline: Candle → Scout (algorithmic filter) → Analyst (validate) → Trader (decision)
# 90%+ of candles are filtered by the deterministic Scout in the scout: section below.
# -----------------------------------------------------------------------------
brain:
  openrouter_api_key: ""       # Override via KT_OPENROUTER_API_KEY env var
  openrouter_base_url: "https://openrouter.ai/api/v1"

  # Maximum seconds to wait for an OpenRouter API response before timing out.
  #   60  = aggressive (may timeout on slower models)
  #   120 = default
  #   300 = permissive (for heavy Opus-tier requests)
  request_timeout_s: 120.0

  analyst:
    # Tier 2 — Financial reasoning: 88.23% accuracy ($1.25/$10.00 per M tokens)
    # Alternatives: anthropic/claude-opus-4.6 (87.82%), anthropic/claude-sonnet-4.5 (83.61%)
    model_id: "openai/gpt-5.4-mini"
    retries: 2
    temperature: 0.0
    seed: 42

  trader:
    # Tier 3 — Final decision: 87.82% accuracy, most token-efficient ($5.00/$25.00 per M tokens)
    # Alternatives: openai/gpt-5 (88.23%), openai/gpt-4.1 (best tool-calling value)
    # or "anthropic/claude-opus-4.6"
    model_id: "openai/gpt-5.4"
    retries: 2
    temperature: 0.0

# -----------------------------------------------------------------------------
# Scout — deterministic pattern filter (replaces former LLM Scout tier)
# Runs before the Brain agents. Checks six technical criteria against
# pre-computed indicators and returns INTERESTING or SKIP in < 1 ms.
# -----------------------------------------------------------------------------
scout:
  # Volatility regimes that block trading outright (merged VolatilityGate).
  # Any regime listed here causes an immediate SKIP.
  #   ["LOW", "EXTREME"] = default (blocks very quiet and spiking markets)
  #   ["EXTREME"]        = permissive (allows quiet markets)
  blocked_regimes: ["LOW", "EXTREME"]

  # Volume ratio below which SKIP is forced regardless of other signals.
  #   0.2 = permissive    0.3 = default    0.5 = strict
  vol_ratio_hard_skip: 0.3

  # Volume ratio below which SKIP is favoured unless a criterion matches.
  #   0.5 = permissive    0.8 = default    1.0 = strict
  vol_ratio_soft_skip: 0.8

  # Criterion 1 BREAKOUT — price beyond Bollinger Band with volume.
  #   1.0 = permissive    1.2 = default    1.5 = strict
  breakout_vol_ratio_min: 1.2

  # Criterion 2 TREND CONTINUATION — EMA alignment + RSI mid-range + volume.
  trend_rsi_low: 40            # 30 = wide, 40 = default, 45 = strict
  trend_rsi_high: 60           # 70 = wide, 60 = default, 55 = strict
  trend_vol_ratio_min: 1.0     # 0.8 = permissive, 1.0 = default, 1.2 = strict

  # Criterion 3 REVERSAL — RSI extreme + price at BB boundary.
  reversal_rsi_oversold: 30    # 25 = strict, 30 = default, 35 = permissive
  reversal_rsi_overbought: 70  # 75 = strict, 70 = default, 65 = permissive
  reversal_percent_b_lower: 0.1   # 0.05 = strict, 0.1 = default, 0.15 = permissive
  reversal_percent_b_upper: 0.9   # 0.95 = strict, 0.9 = default, 0.85 = permissive

  # Criterion 4 VOLUME SPIKE — large volume + large body + supporting signal.
  volume_spike_ratio_min: 2.0       # 1.5 = permissive, 2.0 = default, 3.0 = strict
  volume_spike_body_ratio_min: 0.5  # 0.3 = permissive, 0.5 = default, 0.7 = strict
  volume_spike_rsi_low: 35          # 30 = permissive, 35 = default, 40 = strict
  volume_spike_rsi_high: 65         # 70 = permissive, 65 = default, 60 = strict
  volume_spike_percent_b_lower: 0.15  # 0.1 = strict, 0.15 = default, 0.2 = permissive
  volume_spike_percent_b_upper: 0.85  # 0.9 = strict, 0.85 = default, 0.8 = permissive

  # Criterion 5 MOMENTUM SHIFT — MACD histogram sign change.
  momentum_min_candles: 3      # preceding candles that must oppose the histogram

  # Criterion 6 TREND WITH PULLBACK — EMA aligned + price movement.
  pullback_price_change_min: 1.5  # 0.5 = permissive, 1.5 = default, 2.5 = strict

# -----------------------------------------------------------------------------
# Trading — symbols, timeframe, portfolio limits
# -----------------------------------------------------------------------------
trading:
  # Binance Futures symbols to monitor and trade
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
    - DOGEUSDT
    - BNBUSDT
    - TAOUSDT
    - SUIUSDT
    - ADAUSDT
    - AVAXUSDT
    - LINKUSDT
    - LTCUSDT
    - NEARUSDT
    - INJUSDT
    - WIFUSDT
    - TONUSDT
    - BCHUSDT
    - AAVEUSDT

  # Candlestick interval for analysis
  # Valid: 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 1d
  interval: "5m"

  # How many candles to backfill into the in-memory cache at startup.
  # This improves indicator warmup without increasing Brain prompt size.
  history_candles: 1000

  # Max concurrent positions is configured in risk.max_positions

# -----------------------------------------------------------------------------
# Futures — USDT-M perpetual futures settings
# -----------------------------------------------------------------------------
futures:
  # Default leverage for all symbols (overridable per symbol below).
  #   1  = no leverage (spot-equivalent)
  #   3  = conservative (liquidation ~33% from entry)
  #   5  = default (liquidation ~20% — 13×-40× safety buffer over typical 0.5-1.5% SL)
  #   10 = aggressive (liquidation ~10% from entry — NOT recommended)
  default_leverage: 5

  # Margin type for all positions.
  #   "ISOLATED" = each position has its own margin (default — safer)
  #   "CROSSED"  = all positions share margin (dangerous — one bad trade drains account)
  margin_type: "ISOLATED"

  # Position mode on Binance Futures.
  #   "ONE_WAY" = one position per symbol (default — simpler)
  #   "HEDGE"   = can hold both LONG and SHORT simultaneously (not supported)
  position_mode: "ONE_WAY"

  # Per-symbol leverage overrides (symbol → leverage).
  # If a symbol is not listed here, default_leverage is used.
  # TAO kept at 3x: extreme vol (90-160% annualized), thin liquidity,
  # Binance reduced max leverage to 20x in Aug 2024.
  symbol_leverage:
    TAOUSDT: 3
    WIFUSDT: 3
    HYPEUSDT: 3
    TONUSDT: 3

  # Distance from liquidation price (%) at which position manager triggers
  # emergency exit as a safety net (in case SL order fails to fill).
  liquidation_emergency_percent: 5.0

  # Maximum account margin ratio (maintenance margin / margin balance).
  # New trades are rejected when this threshold is exceeded.
  #   0.3 = conservative
  #   0.5 = default
  #   0.8 = permissive (dangerous)
  max_margin_ratio: 0.5

# -----------------------------------------------------------------------------
# Risk — per-trade sizing, drawdown limits, volatility regime detection
# -----------------------------------------------------------------------------
risk:
  # Percentage of total account balance risked on a single trade.
  # risk_amount = account_balance * (risk_per_trade_percent / 100)
  # Then position size = risk_amount / stop_loss_distance.
  #   0.5  = conservative (small positions)
  #   1.0  = moderate (default)
  #   2.0  = aggressive (larger positions, higher drawdown risk)
  risk_per_trade_percent: 1.0

  # Maximum concurrent open positions (rejects new trades when reached).
  #   1 = single-position mode (simplest)
  #   2 = default (one per symbol)
  #   3+ = multi-pair portfolio
  max_positions: 6

  # Minimum risk:reward ratio required to accept a trade.
  # Calculated as: (distance to TP) / (distance to SL) >= min_rr_ratio
  #   1.0 = breakeven expectancy (not recommended)
  #   1.5 = default — need $1.50 reward for every $1 risked
  #   2.0 = conservative (fewer but higher-quality setups)
  #   3.0 = very selective
  min_rr_ratio: 1.5

  # Account drawdown (%) at which NEW trades are paused (existing positions stay open).
  # Calculated from peak account balance.
  #   2.0  = tight (pauses early)
  #   3.0  = default
  #   5.0  = permissive
  drawdown_pause_percent: 3.0

  # Account drawdown (%) at which ALL positions are emergency-closed.
  # Circuit breaker — must be greater than drawdown_pause_percent.
  #   5.0  = default
  #   10.0 = permissive (dangerous for small accounts)
  drawdown_close_all_percent: 5.0

  # Minimum stop-loss distance in ATR multiples.
  # Rejects trades where SL is too tight (likely to be stopped out by noise).
  #   0.3 = very tight (high noise risk)
  #   0.5 = default
  #   1.0 = wide minimum
  min_sl_atr: 0.5

  # Maximum stop-loss distance in ATR multiples.
  # Rejects trades where SL is too wide (excessive per-trade risk).
  #   2.0 = tight cap
  #   3.0 = default
  #   5.0 = permissive (large swings tolerated)
  max_sl_atr: 3.0

  # Volatility regime detection via ATR Z-score.
  # Z-score = (current_ATR - mean_ATR) / stdev_ATR over atr_zscore_period candles.
  # Regimes: LOW → NORMAL → HIGH → EXTREME
  #
  # LOW regime (z < low_threshold): insufficient price movement, trading blocked.
  #  -1.5 = strict (blocks more often)
  #  -1.0 = default
  #  -0.5 = permissive
  volatility_low_threshold: -1.5

  # HIGH regime (z >= high_threshold): elevated volatility, position size halved (50%).
  #   0.5 = sensitive (triggers size reduction sooner)
  #   1.0 = default
  #   1.5 = permissive
  volatility_high_threshold: 1.0

  # EXTREME regime (z >= extreme_threshold): market spike/crash, trading blocked.
  #   1.5 = sensitive
  #   2.0 = default
  #   3.0 = permissive (allows trading in very volatile conditions)
  volatility_extreme_threshold: 2.0

  # Maximum position notional value as percentage of account balance.
  # Prevents oversized positions on low-priced assets where ATR-based sizing
  # produces tiny risk but huge notional exposure.
  #   20.0 = conservative
  #   30.0 = restrictive (caps sizer to 15-25% of risk budget on low-price assets)
  #   50.0 = default (max $5,000 notional on a $10,000 account)
  #   80.0 = permissive
  max_notional_percent: 50.0

  # Number of historical ATR values for Z-score mean/stdev calculation.
  #   14 = responsive (reacts quickly to regime changes)
  #   30 = default (balanced smoothing)
  #   50 = stable (slow to change regime, fewer false signals)
  atr_zscore_period: 30

# -----------------------------------------------------------------------------
# Position Management — trailing stops, break-even, partial exits, scaling
# These checks run every position_check_interval_s seconds.
# -----------------------------------------------------------------------------
position_management:
  # Trailing stop distance in ATR multiples.
  # Once trade is 2+ ATR in profit, SL trails at this distance below price (LONG)
  # or above price (SHORT).
  #   1.0 = tight trail (locks profit fast, more likely to be stopped)
  #   1.5 = default
  #   2.0 = wide trail (gives more room, but gives back more profit on reversal)
  trailing_stop_atr_multiplier: 1.5

  # Profit threshold (in ATR multiples) to activate trailing stop.
  # Must be greater than break_even_trigger_atr.
  #   1.5 = aggressive trailing (locks profit early)
  #   2.0 = default
  #   3.0 = patient (waits for large move)
  trailing_stop_trigger_atr: 2.0

  # Profit threshold (in ATR multiples) to move SL to entry price (break-even).
  # Eliminates downside risk after initial favorable move.
  #   1.0 = aggressive (move to BE early)
  #   1.5 = default (1.5 ATR of profit before BE)
  #   2.0 = patient (waits for larger move)
  break_even_trigger_atr: 1.5

  # Minimum seconds a position must be held before break-even can activate.
  # Prevents premature BE-SL on normal retraces after initial favorable move.
  #   300  = 5 min (aggressive — early BE)
  #   900  = default (15 min — allows normal pullbacks)
  #   1800 = 30 min (patient)
  break_even_min_hold_s: 900

  # Progress toward take-profit (0.0–1.0) at which to take partial profit.
  # 0.65 means "when price reaches 65% of the way from entry to TP".
  #   0.5  = early partial (locks profit sooner)
  #   0.65 = default (two-thirds to TP)
  #   0.75 = late partial (lets more of the move play out)
  partial_exit_at_percent: 0.65

  # Fraction of position size (0.0–1.0) to close on partial exit.
  #   0.25 = exit quarter of position
  #   0.3  = default (exit 30%)
  #   0.5  = exit half of position
  partial_exit_size: 0.3

  # Minimum profit in ATR multiples before partial exit is allowed.
  # Prevents micro-profit partial exits where commission > captured profit.
  #   0.5 = permissive
  #   1.0 = default
  #   1.5 = strict (only partial exit on strong moves)
  partial_exit_min_profit_atr: 1.0

  # Maximum hours a position can stay open before force-close.
  # Prevents capital from being tied up in stale, non-moving trades.
  #   12 = aggressive (half-day max)
  #   24 = default (one day)
  #   48 = patient (two days)
  max_hold_time_hours: 24

# -----------------------------------------------------------------------------
# Order Flow — funding rate and open interest monitoring
# Fetch interval is configured in orchestrator.order_flow_fetch_interval_s
# -----------------------------------------------------------------------------
order_flow:
  # Z-score threshold for flagging extreme funding rate conditions.
  # Extreme funding often precedes mean-reversion moves.
  #   1.5 = sensitive
  #   2.0 = default
  #   3.0 = only flag severe extremes
  funding_extreme_threshold: 2.0

# -----------------------------------------------------------------------------
# Filters — pre-trade validation gates (all must pass before execution)
# -----------------------------------------------------------------------------
filters:
  # Funding rate Z-score above which LONG trades are rejected as "crowded".
  # High positive funding = longs paying shorts = overcrowded long side.
  #   1.5 = strict (blocks longs earlier)
  #   2.0 = default
  #   3.0 = permissive
  crowded_long_zscore: 2.0

  # Funding rate Z-score below which SHORT trades are rejected as "crowded".
  # Large negative funding = shorts paying longs = overcrowded short side.
  #  -1.5 = permissive
  #  -2.0 = default
  #  -3.0 = strict (blocks shorts only at extreme negative funding)
  crowded_short_zscore: -2.0

  # Minimum candle body size as a ratio of current ATR.
  # Filters out small/doji candles without meaningful directional movement.
  # body_ratio = abs(close - open) / ATR
  #   0.2 = permissive (accepts smaller candles)
  #   0.3 = default
  #   0.5 = strict (requires strong directional candle)
  min_body_atr_ratio: 0.3

  # Position size multiplier for weekend trading (Saturday, Sunday before 20:00 UTC).
  # Crypto markets have lower liquidity on weekends — wider spreads, more slippage.
  #   0.25 = very conservative (quarter size)
  #   0.5  = default (half size)
  #   1.0  = no weekend reduction (not recommended)
  weekend_size_multiplier: 0.5

  # Map of correlated pairs. If a correlated symbol already has an open position,
  # the new position's size is reduced to limit portfolio correlation risk.
  correlated_pairs:
    BTCUSDT: ["ETHUSDT", "LTCUSDT", "BCHUSDT"]
    ETHUSDT: ["BTCUSDT", "LINKUSDT"]
    SOLUSDT: ["AVAXUSDT", "SUIUSDT", "NEARUSDT", "INJUSDT"]
    SUIUSDT: ["SOLUSDT"]
    LINKUSDT: ["ETHUSDT"]
    AVAXUSDT: ["SOLUSDT"]
    LTCUSDT: ["BTCUSDT"]
    BCHUSDT: ["BTCUSDT"]
    NEARUSDT: ["SOLUSDT"]
    INJUSDT: ["SOLUSDT"]
    WIFUSDT: ["SOLUSDT", "DOGEUSDT"]
    DOGEUSDT: ["WIFUSDT"]

  # Fear & Greed Index extreme-fear threshold.
  # Trades are blocked when FGI <= this value (true panic territory).
  #   5  = only block at extreme panic (current)
  #   10 = block at moderate fear (previous default)
  fgi_extreme_fear_threshold: 5

# -----------------------------------------------------------------------------
# Redis — event store and state management backend
# Start with: cd docker && docker-compose up -d
# -----------------------------------------------------------------------------
redis:
  host: "localhost"
  port: 6379                   # Default Redis port
  db: 0                        # Redis database index (0–15)
  password: ""                 # Leave empty for no auth; set for production

# -----------------------------------------------------------------------------
# Execution — order placement, staleness detection, retry logic
# -----------------------------------------------------------------------------
execution:
  # Maximum seconds to wait for an order to be filled on Binance.
  # If not filled within this window, order is considered failed.
  #   10 = fast timeout (may miss fills in illiquid conditions)
  #   30 = default
  #   60 = patient (useful for large orders)
  timeout_s: 30

  # Decision staleness thresholds per volatility regime (milliseconds).
  # If a trade decision is older than this threshold when it reaches the execution
  # engine, it is marked EXPIRED and discarded (market has moved since the decision).
  # Lower = stricter freshness requirement.
  #
  #   LOW     regime: market is slow, decisions stay valid longer  → 300000ms (5min)
  #   NORMAL  regime: default market conditions                    → 120000ms (2min)
  #   HIGH    regime: fast-moving market, decisions stale quicker  →  30000ms (30s)
  #   EXTREME regime: spiking market, only very fresh decisions    →  10000ms (10s)
  staleness_thresholds_ms:
    LOW: 300000
    NORMAL: 120000
    HIGH: 30000
    EXTREME: 10000

  # Whether to place SL and TP orders immediately after entry fill.
  # true  = place SL/TP right away (recommended — protects against sudden moves)
  # false = defer SL/TP placement (e.g. for manual management)
  immediate_sl_tp: true

  # Maximum retry attempts for failed order submissions (e.g. network errors).
  #   1 = no retries (fail fast)
  #   3 = default
  #   5 = aggressive retrying
  max_retry_attempts: 3

# -----------------------------------------------------------------------------
# Events — Redis Streams event sourcing (immutable audit trail)
# -----------------------------------------------------------------------------
events:
  # Maximum entries per Redis Stream before oldest entries are trimmed.
  # Uses approximate trimming (MAXLEN ~) for performance.
  #   10000   = small footprint (~few MB)
  #   100000  = default (~tens of MB, covers days of trading)
  #   1000000 = large history (hundreds of MB)
  stream_max_length: 100000

  # Days to retain events before periodic pruning removes them.
  #   30  = one month
  #   90  = default (one quarter)
  #   365 = one year (large storage)
  retention_days: 90

  # Redis Stream key names for each event aggregate type.
  # Change these only if you need to avoid key collisions in a shared Redis instance.
  streams:
    orders: "kt:events:orders"
    positions: "kt:events:positions"
    decisions: "kt:events:decisions"
    system: "kt:events:system"
    liquidations: "kt:events:liquidations"

# -----------------------------------------------------------------------------
# Orchestrator — async loop intervals and WebSocket reconnection
# Manages 5 concurrent loops: DataIngest, OrderFlow, Reasoning, Execution,
# PositionManagement.
# -----------------------------------------------------------------------------
orchestrator:
  # Initial delay (seconds) before first WebSocket reconnection attempt.
  # Backs off exponentially on repeated failures up to ws_max_reconnect_delay_s.
  #   0.5 = fast first retry
  #   1.0 = default
  #   5.0 = cautious
  ws_reconnect_delay_s: 1.0

  # Maximum delay cap (seconds) for exponential WebSocket reconnection backoff.
  # Prevents backoff from growing indefinitely.
  #   30  = aggressive cap (reconnects sooner)
  #   60  = default
  #   120 = patient
  ws_max_reconnect_delay_s: 60.0

  # How often (seconds) the OrderFlowLoop fetches funding rate / open interest.
  # Underlying data refreshes every 15 min (OI/L-S ratio) or 8h (funding).
  #   60  = aggressive polling
  #   300 = default (well under 15m refresh rate, 5x fewer API calls)
  #   600 = conservative
  order_flow_fetch_interval_s: 300

  # How often (seconds) the ReasoningLoop scans symbols and asks the Brain
  # for new trade decisions.
  #   30 = aggressive
  #   60 = default for 5m candles
  #   120 = conservative
  reasoning_interval_s: 60

  # How often (seconds) PositionManagementLoop evaluates open positions
  # for trailing stop, break-even, partial exit, and time exit actions.
  #   1  = real-time (high CPU)
  #   5  = default
  #   15 = relaxed
  position_check_interval_s: 5

  # How often (seconds) the orchestrator runs a health check on all loops.
  # Logs warnings if any loop becomes unresponsive.
  #   10 = frequent monitoring
  #   30 = default
  #   60 = infrequent
  health_check_interval_s: 30

  # Timeout (seconds) for graceful shutdown — waits for loops to finish
  # before force-cancelling remaining tasks.
  #   5  = fast shutdown
  #   10 = default
  #   30 = patient (useful if orders are in-flight)
  graceful_shutdown_timeout_s: 10

# -----------------------------------------------------------------------------
# Monitoring — logging format, decision audit trail, metrics
# -----------------------------------------------------------------------------
monitoring:
  # Log output format.
  #   "json" = structured JSON lines (recommended for production / log aggregation)
  #   "text" = human-readable text (useful for local development)
  log_format: "json"

  # Application log level (can be overridden with --verbose CLI flag → DEBUG).
  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: "DEBUG"

  # Whether to log every trader decision to the decision audit trail.
  decision_log_enabled: true

  # Days to retain decision logs before cleanup.
  #   7   = one week
  #   30  = default (one month)
  #   90  = one quarter
  decision_log_retention_days: 30

  # Whether system metrics collection is enabled (for future Prometheus / etc.).
  metrics_enabled: true

# -----------------------------------------------------------------------------
# Reporting — live HTML session reports
# -----------------------------------------------------------------------------
reporting:
  # Whether to generate live HTML reports during trading sessions.
  enabled: true

  # Directory where session report HTML files are written.
  # A new timestamped file is created for each session/run.
  report_dir: "results/reports"

  # How often (seconds) the HTML page auto-refreshes in the browser.
  #   3  = default (responsive during active trading)
  #   10 = relaxed (lower browser resource usage)
  refresh_interval_s: 3

  # Maximum number of entries to keep in the activity log.
  max_action_entries: 500

  # Maximum number of entries to keep in the trade actions table.
  max_trade_entries: 200

# -----------------------------------------------------------------------------
# External Sources — market-wide sentiment and options data
# Fetched periodically (not per-symbol), synthesized by a cheap LLM into a
# compact summary consumed by Analyst and Trader prompts.
# Scout is algorithmic and does NOT use external data.
# -----------------------------------------------------------------------------
external_sources:
  # Master switch — disables all external data fetching and synthesis.
  enabled: true

  # How often (seconds) the combined fetch + synthesize cycle runs.
  # All sources are fetched in parallel, then the synthesizer LLM runs.
  #   60  = aggressive (wastes LLM calls on slowly-changing data)
  #   300 = default (5 min — catches meaningful changes without waste)
  #   600 = conservative
  run_interval_s: 300

  # Deribit DVOL Index + BTC Put/Call Ratio (Options Market)
  # Public API, no auth required. ~20 req/s rate limit.
  deribit_dvol:
    enabled: true

  # Crypto Fear & Greed Index (Alternative.me)
  # Public API, no auth required. Updated daily at midnight UTC.
  fear_greed:
    enabled: true

  # CCData News Sentiment (CryptoCompare successor)
  # Free, no API key required.
  ccdata_news:
    enabled: true
    max_results: 20
    max_headlines: 5

  # Sentiment Synthesizer — cheap LLM that pre-digests raw external data
  # into a compact summary for Analyst/Trader consumption.
  # Uses OpenRouter (same KT_OPENROUTER_API_KEY as brain agents).
  synthesizer:
    enabled: true
    model_id: "deepseek/deepseek-chat-v3-0324"
    temperature: 0.0
    retries: 1

# -----------------------------------------------------------------------------
# Paper Trading — local simulation and Binance Testnet configuration
# -----------------------------------------------------------------------------
paper:
  # Trading mode — controls where orders are routed.
  #   "PAPER"    = simulated execution with in-memory balance (no exchange needed)
  #   "TESTNET"  = execute against Binance Testnet (no real money; default)
  #   "LIVE"     = execute against live Binance Futures (real money!)
  #   "DISABLED" = disable all execution (analysis-only / dry-run mode)
  mode: "TESTNET"

  # Paper trading initial USDT balance (used with --paper CLI flag).
  #   5000   = small account
  #   10000  = default
  #   100000 = large paper account
  initial_balance_usdt: 10000

  # Simulated commission rate per trade (0.001 = 0.1%, Binance standard).
  #   0.0    = no commission (optimistic)
  #   0.001  = default (0.1% — Binance spot/futures taker fee)
  #   0.002  = conservative (accounts for slippage)
  commission_rate: 0.001

  # Binance Testnet API credentials (override via env vars for security)
  testnet_api_key: ""
  testnet_api_secret: ""

  # Testnet endpoint URLs (Binance Futures testnet)
  testnet_base_url: "https://testnet.binancefuture.com"
  testnet_ws_url: "wss://stream.binancefuture.com/ws"
