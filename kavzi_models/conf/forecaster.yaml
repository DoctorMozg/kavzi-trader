# Forecaster model configuration
# This file is used by Hydra for configuring the forecaster model

# General settings
experiment_name: forecaster_base
seed: 42
model_save_path: models/forecaster

# Symbol and interval to train on (can be overridden via command line)
symbol: BTCUSDT
interval: 1h
start_date: null  # Optional start date
end_date: null    # Optional end date

# Data configuration
data:
  # Time series parameters
  window_size: 30
  forecast_horizon: 1
  stride: 1
  
  # Feature selection
  price_features:
    - open
    - high
    - low
    - close
    - volume
  
  technical_indicators:
    - rsi
    - macd
    - macd_signal
    - macd_hist
    - bb_upper
    - bb_middle
    - bb_lower
    - atr
    - adx
  
  target_column: close
  
  # Data normalization
  normalization_method: zscore
  
  # Dataset splitting
  val_size: 0.15
  test_size: 0.15
  time_based_split: true
  
  # Data paths
  data_dir: data
  cache_dir: data/cache

# Model configuration
model:
  # Model architecture
  d_model: 128
  n_heads: 8
  n_layers: 4
  d_ff: 256
  dropout: 0.1
  
  # Activation functions
  activation: gelu
  
  # Output head configuration
  prediction_type: regression
  output_activation: null
  quantiles:
    - 0.1
    - 0.5
    - 0.9

# Training configuration
training:
  # Basic training parameters
  batch_size: 64
  learning_rate: 1.0e-4
  weight_decay: 1.0e-6
  max_epochs: 100
  early_stopping_patience: 10
  
  # Optimizer settings
  optimizer: adam
  lr_scheduler: cosine
  
  # Loss function
  loss_fn: mse
  
  # Device settings
  device: cuda
  precision: float32
  
  # Checkpointing
  checkpoint_dir: models/checkpoints
  save_top_k: 2
  
  # Logging
  log_dir: logs
  log_every_n_steps: 50

# Hydra configuration
hydra:
  run:
    dir: outputs/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: true 